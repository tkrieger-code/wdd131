<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Product Review Form - Tatiane Krieger</title>
    <meta name="description" content="WDD 131 - Product Review Form, developed by Tatiane Krieger. This page is a product review form, with a confirmation page.">
    <meta name="author" content="Tatiane Krieger">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">

            <div class="form-control">
                <label for="productName">Product Name<span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Choose a Product</option>
                </select>
            </div>

           <div class="form-control">
                <fieldset class="rating-fieldset">
                    <legend>Overall Rating <span class="required">*</span></legend>
                    <div class="rating-group">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5" title="5 stars">☆</label>
                        
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4" title="4 stars">☆</label>
                        
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3" title="3 stars">☆</label>
                        
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2" title="2 stars">☆</label>
                        
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1" title="1 star">☆</label>
                    </div>
                </fieldset>
            </div>

            <div class="form-control">
                <label for="installationDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installationDate" name="installationDate" required>
            </div>

            <div class="form-control">
                <fieldset class="features-fieldset">
                    <legend>Which features did you find useful in the product? (Check all that apply):</legend>
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="features" value="durability"> Durability
                        </label>
                        <label>
                            <input type="checkbox" name="features" value="easy-to-use"> Ease of Use
                        </label>
                        <label>
                            <input type="checkbox" name="features" value="performance"> Performance
                        </label>
                        <label>
                            <input type="checkbox" name="features" value="design"> Design
                        </label>
                    </div>
                </fieldset>
            </div>

            <div class="form-control">
                <label for="writtenReview">Written Review (Optional):</label>
                <textarea id="writtenReview" name="writtenReview" rows="5" placeholder="Tell us more about your experience..."></textarea>
            </div>

            <div class="form-control">
                <label for="username">Your Name (Optional):</label>
                <input type="text" id="username" name="username" placeholder="Ex: Maria" autocomplete="name">
            </div>

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Tatiane Krieger | Brasil</p>
        <p id="lastModified"></p>
    </footer>
</body>
