<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Page</title>
    <meta name="description" content="WDD 131 - Dynamic Web Fundamentals, developed by Tatiane Krieger. The subject of this page is to show country or place where a live, have visited, or wish to visit.">
    <meta name="author" content="Tatiane Krieger">

    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>

</head>
<body>

    <header>
        <div class="title-container">
            <h1>Portugal</h1>
        </div>
        <div class="green-bar"></div>
    </header>

    <main>
        <div class="hero-container">
            <picture>
                <source media="(min-width: 1000px)" srcset="images/torre-de-belem.webp">
                <img src="images/torre-de-belem.webp" alt="Belém Tower in Lisbon, Portugal" class="hero-image">
            </picture>

            <div class="content-cards">
                <section class="card data-card">
                    <div class="card-header"><h2>Data</h2></div>
                    <div class="card-body">
                        <div class="list-item"><span class="label">Area:</span><span class="value">92,212 km²</span></div>
                        <div class="list-item"><span class="label">Population:</span><span class="value">10.3 M (2023 est.)</span></div>
                        <div class="list-item"><span class="label">Capital:</span><span class="value">Lisbon</span></div>
                        <div class="list-item"><span class="label">Languages:</span><span class="value">Portuguese</span></div>
                        <div class="list-item"><span class="label">Currency:</span><span class="value">Euro (€)</span></div>
                        <div class="list-item"><span class="label">Time Zone:</span><span class="value">WET (UTC+0, UTC+1)</span></div>
                        <div class="list-item"><span class="label">Calling Code:</span><span class="value">+351</span></div>
                        <div class="list-item"><span class="label">Internet TLD:</span><span class="value">.pt</span></div>
                    </div>
                </section>

                <section class="card weather-card">
                    <div class="card-header">
                        <h2>Weather</h2>
                        <svg class="weather-svg-mobile" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="white">
                            <path d="M6 14a4 4 0 0 1 3.42-3.93 5 5 0 0 1 9.46-1.93A4.5 4.5 0 0 1 17.5 17H7.5A3.5 3.5 0 0 1 4 13.5a3.42 3.42 0 0 1 2-2.93z" fill="#fff"/>
                            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M16.94 16.94l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M16.94 7.06l1.42-1.42" stroke="#ffeb3b" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="card-body">
                        <div class="list-item"><span class="label">Temperature:</span><span class="value">18°C</span></div>
                        <div class="list-item"><span class="label">Conditions:</span><span class="value">Partly Cloudy</span></div>
                        <div class="list-item"><span class="label">Wind:</span><span class="value">12 km/h</span></div>
                        <div class="list-item"><span class="label">Wind Chill:</span><span class="value" id="windchill"></span></div>
                    </div>
                </section>
             </div>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Tatiane Krieger | Brasil</p>
        <p id="lastModified"></p>
    </footer> 

</body>
</html>
